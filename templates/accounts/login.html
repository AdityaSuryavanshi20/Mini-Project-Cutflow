{% extends "base/base.html" %}
{% block auth_content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login – CutFlow</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, #1E3A5F 0%, #2B5797 100%); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; }
  .login-card { background: #fff; border-radius: 12px; padding: 2.5rem;
    width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .brand { font-size: 2rem; font-weight: 800; color: #1E3A5F; text-align: center; }
  .brand span { color: #C9922A; }
  .subtitle { text-align: center; color: #718096; font-size: .9rem; margin-bottom: 2rem; }
  .btn-login { background: #1E3A5F; border: none; color: #fff;
    padding: .75rem; font-weight: 600; border-radius: 8px; width: 100%; }
  .btn-login:hover { background: #2B5797; color: #fff; }
  .form-control:focus { border-color: #2B5797; box-shadow: 0 0 0 .2rem rgba(43,87,151,.25); }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">Cut<span>Flow</span></div>
  <div class="subtitle">Fenestration Production Software</div>
  {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-danger small py-2">{{ msg }}</div>
    {% endfor %}
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <input type="text" name="username" class="form-control" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
