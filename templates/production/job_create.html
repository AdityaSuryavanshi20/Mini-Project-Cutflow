{% extends "base/base.html" %}
{% block title %}New Production Job{% endblock %}
{% block page_title %}New Production Job{% endblock %}
{% block nav_jobs %}active{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-header">New Production Job for {{ project.reference }}</div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Project</label>
        <input type="text" class="form-control" value="{{ project.reference }} – {{ project.name }}" readonly>
      </div>
      <div class="mb-3">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="3"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="fa fa-industry me-1"></i>Create Job</button>
        <a href="{% url 'project_detail' project.pk %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
