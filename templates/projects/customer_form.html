{% extends "base/base.html" %}
{% block title %}{{ action }} Customer{% endblock %}
{% block page_title %}{{ action }} Customer{% endblock %}
{% block nav_customers %}active{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-header">{{ action }} Customer</div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Name *</label>
          <input type="text" name="name" class="form-control" required></div>
        <div class="col-md-6"><label class="form-label">Company</label>
          <input type="text" name="company" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"></div>
        <div class="col-md-5"><label class="form-label">Email</label>
          <input type="email" name="email" class="form-control"></div>
        <div class="col-12"><label class="form-label">Address Line 1</label>
          <input type="text" name="address_line1" class="form-control"></div>
        <div class="col-12"><label class="form-label">Address Line 2</label>
          <input type="text" name="address_line2" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">City</label>
          <input type="text" name="city" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">State</label>
          <input type="text" name="state" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Pincode</label>
          <input type="text" name="pincode" class="form-control"></div>
        <div class="col-12"><label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2"></textarea></div>
      </div>
      <div class="mt-3 d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ action }} Customer</button>
        <a href="{% url 'customer_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
